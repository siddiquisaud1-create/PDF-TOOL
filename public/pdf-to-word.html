<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f6f8fc;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #4f46e5, #2563eb);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 80px auto;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  text-align: center;
}

/* INPUT */
input[type="file"] {
  margin: 15px 0;
}

/* BUTTON */
button {
  background: #4f46e5;
  color: white;
  padding: 10px 25px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

/* PROGRESS */
.progress {
  width: 100%;
  height: 10px;
  background: #ddd;
  margin-top: 20px;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}

/* HOME LINK */
.home {
  display: block;
  margin-top: 20px;
  text-decoration: none;
  color: #4f46e5;
}
</style>
</head>

<body>

<header>PDF Master Hub</header>

<div class="container">
<div class="card">

<h2>PDF to Word</h2>

<input type="file" id="file"><br>

<button onclick="upload()">Convert</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<p id="status"></p>

<a href="/" class="home">⬅ Back to Home</a>

</div>
</div>

<script>
function upload() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select file");

  const formData = new FormData();
  formData.append("file", file);

  const xhr = new XMLHttpRequest();

  xhr.upload.onprogress = function(e) {
    const percent = (e.loaded / e.total) * 100;
    document.getElementById("bar").style.width = percent + "%";
  };

  document.getElementById("status").innerText = "Uploading...";

  xhr.onload = function() {
    document.getElementById("status").innerText = "Processing...";

    const blob = new Blob([xhr.response]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "converted.docx";
    a.click();

    document.getElementById("status").innerText = "Done";
  };

  xhr.open("POST", "/pdf-to-word");
  xhr.responseType = "blob";
  xhr.send(formData);
}
</script>
<script src="app.js"></script>
<body onload="init()">
</html>
