<!DOCTYPE html>
<html>
<head>
<title>TOOL_NAME</title>
<link rel="stylesheet" href="styles.css">
</head>

<body onload="init()">

<header>PDF Master Hub</header>

<div class="container">
<div class="card">

<h2>TOOL_NAME</h2>

<!-- Drag & Drop -->
<div id="drop" style="
  border:2px dashed #4f46e5;
  padding:30px;
  border-radius:10px;
  cursor:pointer;
  margin:15px 0;
">
Drag & Drop file or Click
</div>

<!-- File input -->
<input type="file" id="file" accept="FILE_TYPES" hidden onchange="filePicked(this)">

<button onclick="upload()">Convert</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<p id="status"></p>

<a href="/" class="home">⬅ Back to Home</a>

</div>
</div>

<!-- Main script -->
<script src="app.js"></script>

<script>
setup({
  types: FILE_TYPES_ARRAY,
  endpoint: "API_ROUTE",
  output: "OUTPUT_NAME"
});
</script>

</body>
</html>
