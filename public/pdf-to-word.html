<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f6f8fc;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #4f46e5, #2563eb);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 80px auto;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  text-align: center;
}

/* BUTTON */
button {
  background: #4f46e5;
  color: white;
  padding: 10px 25px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

/* PROGRESS */
.progress {
  width: 100%;
  height: 10px;
  background: #ddd;
  margin-top: 20px;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}

/* HOME LINK */
.home {
  display: block;
  margin-top: 20px;
  text-decoration: none;
  color: #4f46e5;
}
</style>
</head>

<body onload="init()">

<header>PDF Master Hub</header>

<div class="container">
<div class="card">

<h2>PDF to Word</h2>

<div id="drop" style="
  border:2px dashed #4f46e5;
  padding:30px;
  border-radius:10px;
  cursor:pointer;
  margin:15px 0;
">
Drag & Drop file or Click
</div>

<input type="file" id="file" hidden onchange="filePicked(this)">

<button onclick="upload()">Convert</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<p id="status"></p>

<a href="/" class="home">⬅ Back to Home</a>

</div>
</div>

<script>
let selectedFile;

function init() {
  const drop = document.getElementById("drop");

  drop.onclick = () => document.getElementById("file").click();

  drop.ondragover = e => {
    e.preventDefault();
    drop.style.background = "#eef2ff";
  };

  drop.ondragleave = () => {
    drop.style.background = "white";
  };

  drop.ondrop = e => {
    e.preventDefault();
    drop.style.background = "white";

    selectedFile = e.dataTransfer.files[0];
    drop.innerText = selectedFile.name;
  };
}

function filePicked(input) {
  selectedFile = input.files[0];
  document.getElementById("drop").innerText = selectedFile.name;
}

function upload() {
  if (!selectedFile) return alert("Select file");

  const formData = new FormData();
  formData.append("file", selectedFile);

  const xhr = new XMLHttpRequest();

  xhr.upload.onprogress = function(e) {
    const percent = (e.loaded / e.total) * 100;
    document.getElementById("bar").style.width = percent + "%";
  };

  document.getElementById("status").innerText = "Uploading...";

  xhr.onload = function() {
    document.getElementById("status").innerText = "Processing...";

    const blob = new Blob([xhr.response]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "converted.docx";
    a.click();

    document.getElementById("status").innerText = "Done";
  };

  xhr.open("POST", "/pdf-to-word");
  xhr.responseType = "blob";
  xhr.send(formData);
}
</script>

</body>
</html>
