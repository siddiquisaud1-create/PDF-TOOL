<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Master Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: white;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #333;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 30px;
  color: #555;
}

/* UPLOAD BOX */
.upload-box {
  max-width: 500px;
  margin: 20px auto;
  padding: 30px;
  border: 2px dashed #6366f1;
  border-radius: 12px;
  text-align: center;
  background: white;
}

.upload-btn {
  background: #ef4444;
  color: white;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* PROGRESS */
.progress {
  height: 8px;
  background: #ddd;
  margin-top: 10px;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}

/* TOOLS */
.tools {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.card {
  background: #f9fafb;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 150px;
}

.card a {
  text-decoration: none;
  color: black;
  font-weight: 500;
}

/* ICON */
.icon {
  width: 50px;
  height: 50px;
  margin: auto;
  border-radius: 12px;
  margin-bottom: 10px;
}

.red { background:#ef4444 }
.blue { background:#3b82f6 }
.green { background:#16a34a }
.teal { background:#14b8a6 }
.orange { background:#f59e0b }

footer {
  text-align: center;
  margin-top: 50px;
}
</style>

</head>

<body>

<header>
  <h2>PDFMasterHub</h2>
  <nav>
    <a href="/">Home</a>
    <a href="#">About</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="upload-box" id="drop">
  Drag & Drop file here <br><br>
  <span class="upload-btn" id="btn">Upload File</span>
  <input type="file" id="file" hidden>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<button id="startUpload">Start Upload</button>

<div id="status"></div>

<!-- Load JS safely -->
<script src="/script.js" defer></script>

  <p id="status"></p>
</div>

<div class="tools">

<div class="card">
<div class="icon red"></div>
<a href="/pdf-to-word.html">PDF → Word</a>
</div>

<div class="card">
<div class="icon blue"></div>
<a href="/word-to-pdf.html">Word → PDF</a>
</div>

<div class="card">
<div class="icon green"></div>
<a href="/pdf-to-excel.html">PDF → Excel</a>
</div>

<div class="card">
<div class="icon teal"></div>
<a href="/merge-pdf.html">Merge PDF</a>
</div>

<div class="card">
<div class="icon orange"></div>
<a href="/compress-pdf.html">Compress PDF</a>
</div>

</div>

<footer>
© 2026 PDF Master Hub |
<a href="/">Home</a>
<a href="#">About</a>
<a href="#">Privacy</a>
<a href="#">Contact</a>
</footer>

<script>
const fileInput = document.getElementById("file");
const btn = document.getElementById("btn");
const bar = document.getElementById("bar");
const status = document.getElementById("status");

btn.onclick = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  // ⚠️ USE ONLY WORKING ROUTE FROM YOUR BACKEND
  const endpoint = "/merge-pdf"; 

  const xhr = new XMLHttpRequest();
  xhr.open("POST", endpoint);

  xhr.upload.onprogress = e => {
    const percent = (e.loaded / e.total) * 100;
    bar.style.width = percent + "%";
  };

  xhr.onload = () => {
    if (xhr.status !== 200) {
      status.innerText = "Server error";
      return;
    }

    const blob = new Blob([xhr.response]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "file.pdf";
    a.click();

    status.innerText = "Done ✅";
  };

  xhr.responseType = "arraybuffer";
  xhr.send(formData);
};
</script>

</body>
</html>
