<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Master Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: rgba(255,255,255,0.05);
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #ddd;
}

/* UPLOAD */
.upload-box {
  max-width: 500px;
  margin: 40px auto;
  padding: 30px;
  border: 2px dashed #3b82f6;
  border-radius: 12px;
  text-align: center;
  background: rgba(255,255,255,0.05);
}

.upload-btn {
  background: linear-gradient(45deg,#ef4444,#3b82f6);
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* PROGRESS */
.progress {
  height: 8px;
  background: #222;
  margin-top: 10px;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#ef4444,#3b82f6);
}

/* TOOLS GRID */
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(59,130,246,0.3);
}

.card.active {
  border: 2px solid #ef4444;
}

/* ICON */
.icon {
  width: 50px;
  height: 50px;
  margin: auto;
  border-radius: 12px;
  margin-bottom: 10px;
}

.red { background:#ef4444 }
.blue { background:#3b82f6 }
.green { background:#16a34a }
.teal { background:#14b8a6 }
.orange { background:#f59e0b }

button {
  display: block;
  margin: 20px auto;
  padding: 10px 25px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#ef4444,#3b82f6);
  color: white;
  cursor: pointer;
}

footer {
  text-align: center;
  margin-top: 40px;
  color: #ccc;
}
</style>

</head>

<body>

<header>
  <h2>PDFMasterHub</h2>
  <nav>
    <a href="/">Home</a>
    <a href="#">About</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- UPLOAD -->
<div class="upload-box" id="drop">
  Drag & Drop file here <br><br>
  <span class="upload-btn" id="btn">Choose File</span>
  <input type="file" id="file" hidden>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<button id="startUpload">Start Upload</button>
<div id="status"></div>

<!-- TOOLS -->
<div class="tools">

<div class="tools">

<a href="/pdf-to-word.html" class="card">
  <div class="icon red"></div>
  PDF → Word
</a>

<a href="/word-to-pdf.html" class="card">
  <div class="icon blue"></div>
  Word → PDF
</a>

<a href="/pdf-to-excel.html" class="card">
  <div class="icon green"></div>
  PDF → Excel
</a>

<a href="/merge-pdf.html" class="card">
  <div class="icon teal"></div>
  Merge PDF
</a>

<a href="/compress-pdf.html" class="card">
  <div class="icon orange"></div>
  Compress PDF
</a>

</div>
</div>

<footer>
© 2026 PDF Master Hub
</footer>

<!-- ONLY external JS -->
<script src="/script.js" defer></script>

</body>
</html>
